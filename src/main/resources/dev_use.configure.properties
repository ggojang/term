# dev_use.configure.properties (개발 환경)
#
# 현재 기본 브라우저 기능에서는 이 파일의 설정값이 사용되지 않습니다.
# 아래 기능을 사용할 경우에만 설정이 필요합니다.
#
# [WebSocket 로그 테일러 - OWL 편집기 연동]
# ws.log.file=/path/to/logs
#
# [사용자 Refset 트리 파일 저장/읽기]
# sct.refset.dir=/path/to/snomedct/refset
#
# [OWL 편집기]
# owl.base.dir=/path/to/snomedct/owl
# owl.load.owlf=snomedct_owlf.owl
